[package]
authors.workspace = true
description       = "LCMP evm message execution."
edition.workspace = true
name              = "darwinia-bls"
readme            = "README.md"
version.workspace = true

[dependencies]
codec      = { package = "parity-scale-codec", workspace = true }
ethereum   = { version = "0.14", default-features = false, features = ["with-codec"] }
scale-info = { workspace = true }

frame-support = { workspace = true }
frame-system  = { workspace = true }
sp-std        = { workspace = true }
array-bytes       = { version = "6.0" }
frame-benchmarking = { workspace = true, optional = true }
pallet-timestamp   = { workspace = true }

milagro_bls = { default-features = false, git = "https://github.com/darwinia-network/milagro_bls" }

ark-bls12-381 = { version = "0.4.0", default-features = false, features = ["curve"] }
ark-ec        = { version = "0.4.1", default-features = false }
ark-ff        = { version = "0.4.1", default-features = false }
ark-serialize = { version = "0.4.1", default-features = false, features = ["derive"] }
sha2          = { version = "0.10.6", default-features = false }

[features]
default = ["std"]
std = [
	# crates.io
	"codec/std",
	"ethereum/std",
	"scale-info/std",

    "frame-support/std",
    "frame-system/std",
    "sp-std/std",
	"pallet-timestamp/std",

    "ark-bls12-381/std",
	"ark-serialize/std",
	"ark-ec/std",
	"ark-ff/std",
	"sha2/std",
	"frame-benchmarking?/std",
]

runtime-benchmarks = [
	# substrate
	"frame-benchmarking/runtime-benchmarks",
	"pallet-timestamp/runtime-benchmarks",
]